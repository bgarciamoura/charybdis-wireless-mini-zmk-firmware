## Split keyboards
## https://zmk.dev/docs/config/system#split-keyboards
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

## ZMK Studio
## https://zmk.dev/docs/features/studio
CONFIG_ZMK_STUDIO=y
## https://zmk.dev/docs/config/studio
CONFIG_ZMK_STUDIO_LOCKING=y
CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=y
CONFIG_ZMK_STUDIO_TRANSPORT_BLE_PREF_LATENCY=5

CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_INPUT_LISTENER=y

## PMW3360 Driver
## https://github.com/mfulz/zmk-driver-pmw3360
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_INPUT_PIXART_PMW3360=y
CONFIG_INPUT_PIXART_PMW3360_USE_OWN_THREAD=y
CONFIG_ZMK_POINTING=y
#CONFIG_SPI_LOG_LEVEL_DBG=y

## Runtime tuning behaviors — bind in keymap to cycle CPI or burst window live.
## Behavior node declarations live in charybdis_pmw3360.dtsi so the cycle .c
## files compile (their bodies are gated by DT_HAS_COMPAT_STATUS_OKAY); without
## those nodes, mfulz's pmw3360_runtime_persistence.c would link against
## undefined _set_cpi_for_device / _set_burst_accumulation_max_samples_for_device.
CONFIG_ZMK_BEHAVIOR_PMW3360_CPI_CYCLE=y
CONFIG_ZMK_BEHAVIOR_PMW3360_BURST_ACCUMULATION_CYCLE=y

## Orientation / inversion / CPI are DTS properties — see charybdis_pmw3360.dtsi
