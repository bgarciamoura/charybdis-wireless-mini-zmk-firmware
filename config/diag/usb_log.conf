# Diagnostic: enable USB CDC ACM serial console on the LEFT peripheral.
#
# The peripheral normally has CONFIG_ZMK_USB=n (HID over USB is forbidden
# on non-central ZMK roles). We do NOT enable ZMK_USB here — only the raw
# Zephyr USB device stack with a CDC ACM endpoint redirected as the
# zephyr,console. That gives us a serial port for early-boot panic
# capture without turning the peripheral into a HID device.
#
# Usage:
#   1. Flash the diag firmware to the left half.
#   2. Plug the half into the host PC over USB-C.
#   3. Open the new CDC ACM serial port:
#        Linux/macOS: screen /dev/ttyACM0 115200
#        Windows    : PuTTY/Tera Term on the new COMx, 115200-8N1
#   4. Press the reset button on the half — Zephyr boot logs and the panic
#      message (if any) flush to the host before reset.

# ── USB device stack (independent of ZMK HID) ──────────────────────────
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="Charybdis Diag"
CONFIG_USB_DEVICE_VID=0x1d50
CONFIG_USB_DEVICE_PID=0x615e
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y

# ── CDC ACM serial endpoint ────────────────────────────────────────────
CONFIG_USB_CDC_ACM=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y

# ── Zephyr logging routed to UART backend ──────────────────────────────
# IMMEDIATE mode flushes each log call synchronously, so panic messages
# reach the host before the watchdog/fatal handler resets the MCU.
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_DEFAULT_LEVEL=4
CONFIG_PRINTK=y

# ── Crash diagnostics ──────────────────────────────────────────────────
CONFIG_THREAD_NAME=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_DEBUG_COREDUMP=y
CONFIG_DEBUG_COREDUMP_BACKEND_LOGGING=y
CONFIG_DEBUG_COREDUMP_MEMORY_DUMP_MIN=y

# ── Optional: hold panic forever instead of resetting ──────────────────
# Uncomment if the reset cycle is too fast to capture the trailing log
# lines. With this off, the MCU spins in the fatal handler — power-cycle
# to recover.
# CONFIG_RESET_ON_FATAL_ERROR=n
