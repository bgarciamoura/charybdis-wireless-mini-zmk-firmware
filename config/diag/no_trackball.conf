# Diagnostic: strip PMW3360 from the right peripheral.
#
# Used to bisect the rapid-red-LED bootloop. If the right half stops
# bootlooping after flashing this build, the PMW3360 driver init (or its
# SPI/IRQ wiring) is the root cause. If it still bootloops, the bug is
# in the shared peripheral init (charybdis.conf / charybdis_common).
#
# Pair with diag/no_trackball.overlay to also disable the DT nodes so
# zmk,input-split doesn't try to subscribe to a driverless trackball.

CONFIG_INPUT_PIXART_PMW3360=n
CONFIG_INPUT_PIXART_PMW3360_USE_OWN_THREAD=n
CONFIG_ZMK_BEHAVIOR_PMW3360_CPI_CYCLE=n
CONFIG_ZMK_BEHAVIOR_PMW3360_BURST_ACCUMULATION_CYCLE=n
