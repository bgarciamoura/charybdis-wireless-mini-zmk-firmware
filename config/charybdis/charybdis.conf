## Bluetooth
## https://zmk.dev/docs/troubleshooting/connection-issues#unreliableweak-connection
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
## https://zmk.dev/docs/config/system#bluetooth
CONFIG_ZMK_BLE=y
## https://zmk.dev/docs/config/bluetooth#kconfig
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y

## Power Management Config
## https://zmk.dev/docs/config/power
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000

CONFIG_ZMK_EXT_POWER=n # see https://github.com/280Zo/charybdis-wireless-mini-zmk-firmware/issues/17

## Battery Level — temporarily disabled. The Supermini nRF52840 boards
## from AliExpress (used here in 3-piece dongle layout) don't ship with
## REGOUT0 set to VDDH mode in UICR; without that, the
## zmk,battery-nrf-vddh driver hardfaults the peripherals at boot when
## the ADC tries to read against a VDDH/5 reference that isn't actually
## configured. RMK never read battery, which is why those builds worked
## on the same hardware. Re-enable once UICR is programmed for VDDH via
## SWD, or once we switch to a divider-based sensor with the right
## hardware circuit on the board.
## https://zmk.dev/docs/config/battery
CONFIG_ZMK_BATTERY_REPORTING=n

## Mouse Emulation
## https://zmk.dev/docs/keymaps/behaviors/mouse-emulation
CONFIG_ZMK_MOUSE=y

## Include input subsystem and drivers in the system config
## https://github.com/mfulz/zmk-driver-pmw3360
CONFIG_INPUT=y

## https://zmk.dev/docs/keymaps/behaviors/macros#behavior-queue-limit
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512

## Enable split keyboard
CONFIG_ZMK_SPLIT=y

